app_role: ${QUANTSAAS_APP_ROLE}

server:
  host: 0.0.0.0
  port: 8080
  read_timeout_seconds: 15
  write_timeout_seconds: 15

database:
  dsn: ${QUANTSAAS_DATABASE_DSN}
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime_minutes: 30

redis:
  addr: ${QUANTSAAS_REDIS_ADDR}
  password: ${QUANTSAAS_REDIS_PASSWORD}
  db: 0

jwt:
  issuer: quantsaas
  secret: ${QUANTSAAS_JWT_SECRET}
  ttl_hours: 72
