services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: quantsaas
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - quantsaas-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantsaas"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - quantsaas-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 2s

  saas:
    profiles: ["container"]
    build:
      context: .
      dockerfile: saas.Dockerfile
    env_file:
      - .env
    environment:
      QUANTSAAS_APP_ROLE: ${QUANTSAAS_APP_ROLE:-dev}
      QUANTSAAS_SERVER_PORT: ${QUANTSAAS_SERVER_PORT:-18080}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${QUANTSAAS_SERVER_PORT:-18080}:${QUANTSAAS_SERVER_PORT:-18080}"

volumes:
  quantsaas-postgres:
  quantsaas-redis:
